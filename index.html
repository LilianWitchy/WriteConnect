<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WriteConnect</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Top Bar -->
  <header class="top-bar">
    <button class="menu-btn left">☰</button>
    <h1 class="logo">WriteConnect</h1>
    <button class="menu-btn right">☰</button>
  </header>

  <!-- Main Split Layout -->
  <main class="container">

    <!-- Readers -->
    <section class="side readers">
      <div class="content">
        <h2>Für Leser</h2>
        <p>
          Entdecke neue Geschichten, Blogs und Texte, bevor sie veröffentlicht werden.  
          Gib Feedback, diskutiere Ideen und begleite Autoren auf ihrem Weg.
        </p>
        <button class="cta">Ich bin Leser</button>
      </div>
    </section>

    <!-- Writers -->
    <section class="side writers">
      <div class="content">
        <h2>Für Autoren</h2>
        <p>
          Teile deine Texte mit echten Lesern.  
          Erhalte Feedback zu Stil, Struktur und Inhalt und verbessere deine Reichweite.
        </p>
        <button class="cta">Ich bin Autor</button>
      </div>
    </section>

  </main>

</body>
</html>
